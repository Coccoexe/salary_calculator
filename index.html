<!DOCTYPE html>
<html lang="it">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Calcolatore Stipendio Netto</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

    <h1>Calcolatore Stipendio Netto</h1>
    <h5 id="irpef-update"></h5>

    <div class="card">

        <label>RAL (€)</label>
        <input type="number" id="ral" placeholder="es. 35000">
        <p class="help">
            Non conosci la RAL?
            Moltiplica il lordo mensile per il numero di Mensilità
        </p>

        <label>Addizionale comunale (%)</label>
        <input type="number" id="municipal" placeholder="es. 0.8">

        <p class="help">
            Non conosci l'aliquota?
            <a href="https://www1.finanze.gov.it/finanze2/dipartimentopolitichefiscali/fiscalitalocale/nuova_addcomirpef/sceltaregione.htm"
                target="_blank">
                Verifica sul sito del MEF
            </a>
        </p>

        <label>Addizionale regionale (%)</label>
        <input type="number" id="regional" placeholder="es. 1.23">

        <p class="help">
            Non conosci l'aliquota?
            <a href="https://www1.finanze.gov.it/finanze2/dipartimentopolitichefiscali/fiscalitalocale/addregirpef/sceltaregione.htm"
                target="_blank">
                Verifica sul sito del MEF
            </a>
        </p>

        <label>Mensilità</label>
        <select id="mensilita">
            <option value="12">12</option>
            <option value="13" selected>13</option>
            <option value="14">14</option>
        </select>

        <label>Lavoratore Pubblico / Dipendente Privato</label>
        <select id="pubblico">
            <option value="0" selected>Dipendente Privato</option>
            <option value="1">Lavoratore Pubblico</option>
        </select>

        <button onclick="calculate()">Calcola</button>

    </div>


    <div class="chart-mode-tabs">
        <button class="tab active" data-mode="annual">Annuale</button>
        <button class="tab" data-mode="monthly">Mensile</button>
    </div>
    <div id="results"></div>
    <canvas id="salaryChart"></canvas>

    <script src="config.js"></script>
    <script src="script.js"></script>

    <footer class="footer">
        © 2026 - Sviluppato da <strong>Alessio Cocco</strong>

        <div class="social">
            <a href="https://github.com/coccoexe" target="_blank">
                <i class="fa-brands fa-github"></i>
            </a>

            <a href="https://linkedin.com/in/alessio-cocco-0a22aa214" target="_blank">
                <i class="fa-brands fa-linkedin"></i>
            </a>
        </div>
    </footer>

</body>

</html>
